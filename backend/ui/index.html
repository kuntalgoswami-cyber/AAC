<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid ABAC-ML Access Control</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        .btn-retrain { background-color: #e67e22; }
        .btn-retrain:hover { background-color: #d35400; }
        #result { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .allow { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .deny { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .step-up { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .explanation { font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Access Control Request</h1>
    
    <div class="form-group">
        <label for="role">Role</label>
        <select id="role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
            <option value="guest">Guest</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="resource">Resource</label>
        <select id="resource">
            <option value="public">Public</option>
            <option value="private">Private</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="is_new_device">Is New Device?</label>
        <select id="is_new_device">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="request_frequency">Request Frequency (last hour)</label>
        <input type="number" id="request_frequency" value="5" min="0">
    </div>
    
    <div class="form-group">
        <label for="time_of_access">Time of Access (0-23)</label>
        <input type="number" id="time_of_access" value="14" min="0" max="23">
    </div>
    
    <button onclick="submitRequest()">Evaluate Access</button>
    <button class="btn-retrain" onclick="retrainModel()">Retrain Model</button>
    
    <div id="result">
        <h3 id="decision-title"></h3>
        <p><strong>Risk Score:</strong> <span id="risk-score"></span></p>
        <p><strong>Policy Decision:</strong> <span id="policy-decision"></span></p>
        <p class="explanation" id="explanation"></p>
    </div>
</div>

<script>
    async function submitRequest() {
        const payload = {
            role: document.getElementById('role').value,
            resource: document.getElementById('resource').value,
            is_new_device: parseInt(document.getElementById('is_new_device').value),
            request_frequency: parseFloat(document.getElementById('request_frequency').value),
            time_of_access: parseInt(document.getElementById('time_of_access').value)
        };

        try {
            const response = await fetch('/access', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = data.final_decision;
            
            document.getElementById('decision-title').innerText = `Decision: ${data.final_decision.toUpperCase()}`;
            document.getElementById('risk-score').innerText = data.risk_score;
            document.getElementById('policy-decision').innerText = data.policy_decision;
            document.getElementById('explanation').innerText = data.explanation;
            
        } catch (error) {
            alert('Error evaluating access request.');
            console.error(error);
        }
    }

    async function retrainModel() {
        try {
            const response = await fetch('/retrain', { method: 'POST' });
            const data = await response.json();
            alert(data.status);
        } catch (error) {
            alert('Error retraining model.');
            console.error(error);
        }
    }
</script>

</body>
</html>
